<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Blog</title>
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var t = localStorage.getItem("theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="index.html">MY_BLOG</a>
      <button id="theme-toggle" class="theme-toggle" type="button"></button>
    </div>
  </header>

  <section class="hero">
    <p class="hero-eyebrow">// personal blog</p>
    <h1>Writing,<br><span>Ideas</span> &amp; Notes.</h1>
  </section>

  <main>
    <div class="controls">
      <input id="search-input" type="search" placeholder="search posts...">
      <div id="tag-filters" class="tag-filters"></div>
    </div>
    <div id="post-list" class="post-list"></div>
  </main>

  <script type="module" src="js/list.js"></script>
</body>
</html>
